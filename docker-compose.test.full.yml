version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: crawlrs-test-postgres
    environment:
      POSTGRES_USER: crawlrs
      POSTGRES_PASSWORD: password
      POSTGRES_DB: crawlrs
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crawlrs -d crawlrs"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - crawlrs-network

  redis:
    image: redis:7-alpine
    container_name: crawlrs-test-redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - crawlrs-network

  chrome:
    image: browserless/chrome:latest
    container_name: crawlrs-test-chrome
    environment:
      - MAX_CONCURRENT_SESSIONS=10
      - MAX_QUEUE_LENGTH=50
      - CONNECTION_TIMEOUT=30000
    ports:
      - "9222:9222"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/json/version"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    volumes:
      - chrome_data:/tmp
    networks:
      - crawlrs-network

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: crawlrs-test-flaresolverr
    environment:
      - LOG_LEVEL=info
      - CAPTCHA_SOLVER=none
      - TZ=UTC
    ports:
      - "8191:8191"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8191/health"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 30s
    volumes:
      - flaresolverr_data:/tmp
    networks:
      - crawlrs-network

  minio:
    image: minio/minio:RELEASE.2024-01-01T00-00-00Z
    container_name: crawlrs-test-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin123
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 5
    networks:
      - crawlrs-network

  crawlrs:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: crawlrs:test
    container_name: crawlrs-app
    command: ["./crawlrs", "api"]
    ports:
      - "3000:3000"
    environment:
      - CRAWLRS__DATABASE__URL=postgres://crawlrs:password@postgres:5432/crawlrs
      - CRAWLRS__REDIS__URL=redis://redis:6379
      - CRAWLRS__SERVER__HOST=0.0.0.0
      - CRAWLRS__SERVER__PORT=3000
      - CRAWLRS__SEARCH__ENGINES__GOOGLE_ENABLED=true
      - CRAWLRS__SEARCH__ENGINES__BING_ENABLED=true
      - CRAWLRS__SEARCH__ENGINES__BAIDU_ENABLED=true
      - CRAWLRS__SEARCH__ENGINES__SOGOU_ENABLED=true
      - CRAWLRS__CHROME_REMOTE_DEBUGGING_URL=http://chrome:9222
      - CRAWLRS__SEARCH__FLARESOLVERR__URL=http://flaresolverr:8191/v1
      - CRAWLRS__RATE_LIMITING__ENABLED=true
      - CRAWLRS__RATE_LIMITING__DEFAULT_RPM=100
      - CRAWLRS__METRICS__ENABLED=true
      - CRAWLRS__METRICS__PORT=3001
      - CRAWLRS__RUST_LOG=info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      chrome:
        condition: service_healthy
    volumes:
      - ../storage:/app/storage
      - ../logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - crawlrs-network

  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: crawlrs-test-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    volumes:
      - prometheus_data:/prometheus
    networks:
      - crawlrs-network

  grafana:
    image: grafana/grafana:10.0.0
    container_name: crawlrs-test-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - crawlrs-network

networks:
  crawlrs-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  chrome_data:
  flaresolverr_data:
  minio_data:
  prometheus_data:
  grafana_data:
