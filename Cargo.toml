[package]
name = "crawlrs"
version = "0.1.0"
edition = "2021"
authors = ["Kirky.X <Kirky-X@outlook.com>"]

exclude = []

[features]
# 默认核心功能（不包含 S3、genai）
default = ["engine-reqwest", "redis-cache", "rate-limiting", "metrics", "dbnexus-postgres", "logging", "config", "oxcache-cache"]

# 预设配置
lite = ["engine-reqwest", "dbnexus-sqlite"]
standard = ["default", "engine-playwright"]
full = ["standard", "engine-fire-cdp", "engine-fire-tls", "engine-flaresolverr", "dbnexus-sqlite", "storage-s3", "search-all", "api-sdk"]

# 实验性功能（需要显式启用）
experimental = ["dep:genai"]

# 搜索引擎组合特性
search-all = ["search-google", "search-bing", "search-baidu", "search-sogou"]

# --- 引擎特性 ---
# 基础 HTTP 引擎 (始终可用)
engine-reqwest = []

# Playwright 引擎 (引入 chromiumoxide)
engine-playwright = ["dep:chromiumoxide"]

# Fire 引擎组件
engine-fire-cdp = []
engine-fire-tls = []

# FlareSolverr 引擎
engine-flaresolverr = []

# --- 浏览器下载特性 (实验性) ---
# 自动下载浏览器功能，需要 chromiumoxide_fetcher
browser-download = ["dep:chromiumoxide_fetcher"]

# --- 存储特性 ---
storage-s3 = ["dep:aws-sdk-s3", "dep:aws-config"]

# --- 搜索特性 ---
search-google = []
search-bing = []
search-baidu = []
search-sogou = []

# --- 基础设施特性 ---
redis-cache = ["dep:redis", "dep:deadpool", "dep:deadpool-redis"]
rate-limiting = ["dep:redis", "dep:deadpool", "dep:deadpool-redis"]
metrics = ["dep:metrics", "dep:metrics-exporter-prometheus"]

# --- 数据库特性 (使用 dbnexus) ---
# dbnexus 负责所有数据库访问，包括连接池、权限控制、迁移等
# 注意：sea_orm 内部使用下划线命名
dbnexus-postgres = ["dep:dbnexus", "dep:sea_orm"]
dbnexus-sqlite = ["dep:dbnexus", "dep:sea_orm"]

# --- 配置管理特性 ---
config = ["dep:confers"]

# --- 日志特性 ---
# inklog: 新一代结构化日志库（替换 tracing 的下一 phase）
logging = ["dep:inklog"]

# --- API SDK 封装特性 ---
# sdforge: 基于 axum/tower 的接口生成器
api-sdk = ["dep:sdforge"]

# --- 缓存特性 ---
# oxcache: 多后端缓存库（moka + redis）
oxcache-cache = ["dep:oxcache"]

# --- 已移除的旧数据库特性 (不再使用) ---
# db-postgres = ["sea-orm/sqlx-postgres", "sqlx/postgres"]
# db-sqlite = ["sea-orm/sqlx-sqlite", "sqlx/sqlite"]

[dependencies]
# Async runtime and web framework
tokio = { version = "1.49", features = [
    "rt-multi-thread",
    "macros",
    "net",
    "fs",
    "io-util",
    "signal",
    "sync",
    "time",
] }
axum = "0.8"
futures = "0.3"
async-trait = "0.1"
tower = { version = "0.5", features = ["util"] }
tower-http = { version = "0.6", features = ["trace", "cors"] }

# Serialization and configuration
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde_yaml = "0.9"
confers = { version = "0.2.2", default-features = false, features = ["validation", "watch", "derive"], optional = true }
# figment: confers 的 Config derive 宏生成代码引用 figment，需作为直接依赖
figment = { version = "0.10", features = ["toml", "json", "yaml", "env"] }

# Error handling
thiserror = "2.0.17"
anyhow = "1.0"

# HTTP client and networking
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls-native-roots", "cookies", "http2", "charset", "macos-system-configuration", "gzip", "brotli"] }
url = "2.5"
rustls = { version = "0.23", default-features = false, features = ["ring", "std", "tls12"] }

# Database - 使用 dbnexus (完全负责数据库底层)
# dbnexus 提供：连接池管理、权限控制、迁移框架、指标监控、审计日志
# 注意：需要同时添加 sea-orm 以支持实体宏
dbnexus = { version = "0.2.0", default-features = false, features = [
    "postgres",           # 仅 PostgreSQL，不再支持 SQLite
    "runtime-tokio-rustls",
    "permission",         # 声明式权限控制
    "cache",              # 缓存支持 (PermissionContext 需要)
    "macros",             # 过程宏 (db_crud, db_permission, db_entity)
    "migration",          # 数据库迁移框架
    "sql-parser",         # SQL 解析器 (包含 regex)
    "metrics",            # Prometheus 指标监控
    "config-env",         # 环境变量配置支持
    "config-toml",        # TOML 配置支持 (替代旧的 config-yaml)
    "chrono",             # chrono 时间类型支持 (crates.io 版名称)
    "uuid",               # UUID 类型支持 (crates.io 版名称)
    "with-json",          # JSON 类型支持
], optional = true }

# Sea-ORM - 需要用于实体宏定义 (dbnexus 构建在 Sea-ORM 之上)
# 注意：版本必须与 dbnexus 保持一致 (2.0.0-rc.27)
# 只有启用 dbnexus 特性时才需要 sea-orm
# 使用 sea_orm 内部名 (Cargo 要求) 通过 package 属性引用实际包
sea_orm = { version = "2.0.0-rc.27", default-features = false, features = ["runtime-tokio-rustls", "macros", "with-chrono", "with-uuid", "with-json"], optional = true, package = "sea-orm" }

# --- 已移除的旧数据库依赖 (不再使用) ---
# sea-orm = { version = "1.1", default-features = false, features = ["runtime-tokio-rustls", "macros", "with-chrono", "with-uuid", "with-json"] }
# sqlx = { version = "0.8", default-features = false, features = ["runtime-tokio-rustls", "macros", "migrate", "uuid", "chrono", "json", "postgres"] }

# Caching and state management
redis = { version = "1.0", features = ["tokio-comp"], optional = true }
deadpool = { version = "0.12", optional = true }
deadpool-redis = { version = "0.23", features = ["rt_tokio_1"], optional = true }
dashmap = "6.1.0"
once_cell = "1.21.3"

# Utilities
uuid = { version = "1.19", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
rand = "0.9.2"
validator = { version = "0.20.0", features = ["derive"] }
sysinfo = "0.37"
dirs = "5.0"

# Logging and observability
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }
tracing-appender = "0.2"
# inklog: 新一代结构化日志库（替换 tracing 的下一 phase）
# crates.io 版 features 适配：file/console-sink 等基础功能在 default 中
inklog = { version = "0.1.2", default-features = false, features = ["cli", "http", "postgres"], optional = true }
# sdforge: API SDK 封装库（基于 axum/tower 的接口生成器）
# crates.io 版 features 适配：serde/serde_json/chrono 为必需依赖非 feature
sdforge = { version = "0.3.1", default-features = false, features = ["http", "axum", "tower", "tower-http", "tokio", "uuid", "validator", "regex"], optional = true }
metrics = { version = "0.24.3", optional = true }
metrics-exporter-prometheus = { version = "0.18.1", default-features = false, features = ["http-listener"], optional = true }

# Web scraping and content processing
scraper = "0.25.0"
robotstxt = "0.3"
chromiumoxide = { version = "0.8.0", default-features = false, features = ["tokio-runtime"], optional = true }
chromiumoxide_fetcher = { version = "0.8.0", optional = true }

# Text processing and encoding
chardetng = "0.1"
encoding_rs = "0.8"
deunicode = "1.6"
lru = "0.16"
strsim = "0.11"
html-escape = "0.2"
serde_urlencoded = "0.7"
urlencoding = "2.1"

# Cryptography and encoding
base64 = "0.22.1"
hmac = "0.12"
sha2 = "0.10"
hex = "0.4"
bcrypt = "0.18"
zeroize = "1.8"

# Network utilities
ipnetwork = "0.21"

# Rate limiting and circuit breaking
# 已移除 governor，替换为 limiteron
limiteron = { version = "0.2.1", default-features = false, features = [
    "postgres",
    "ban-manager",
    "quota-control",
    "circuit-breaker",
    "telemetry",
    "monitoring",
    "parallel-checker",
    "audit-log",
] }

# Concurrency and synchronization
parking_lot = "0.12"

# Regular expressions
regex = "1.12.2"

# Compression
flate2 = "1.1"
brotli = "8.0"
bytes = "1.11"
aws-sdk-s3 = { version = "1.120.0", optional = true }
aws-config = { version = "1.8.12", optional = true }
genai = { version = "0.5.1", optional = true }
toml = "0.9.11"

# Dependency Injection
shaku = "0.6"
shaku_axum = "0.6"
oxcache = { version = "0.3.3", default-features = false, features = ["memory", "redis", "serialization", "macros", "batch-write", "metrics", "bloom-filter", "tracing", "futures"], optional = true }
ahash = "0.8.12"

# API Documentation (optional - controlled by 'openapi' feature)
# utoipa = { version = "5.4", optional = true }
# utoipa-axum = { version = "0.2", optional = true }
# utoipa-swagger-ui = { version = "9.0", optional = true, default-features = false, features = ["axum", "vendored"] }

[dev-dependencies]
tokio = { version = "1.49", features = [
    "rt-multi-thread",
    "macros",
    "net",
    "fs",
    "io-util",
    "signal",
    "sync",
    "time",
    "test-util",
] }
tokio-test = "0.4"
wiremock = "0.6"
reqwest = { version = "0.12", features = ["json"] }
serde_json = "1.0"
cucumber = { version = "0.22", features = ["macros"] }
axum-test = "18.6.0"
futures = "0.3"
tempfile = "3.24"
uuid = { version = "1.19", features = ["v4"] }
# sqlx 已在主依赖中移除，不再用于测试
# sqlx = { version = "0.8", features = ["runtime-tokio-rustls", "sqlite"] }
criterion = { version = "0.8", features = ["html_reports"] }

[[test]]
name = "integration_tests"
path = "tests/integration/mod.rs"
required-features = ["full"]

[[bench]]
name = "benchmark"
harness = false
path = "benches/benchmark.rs"

[[bin]]
name = "crawlrs"
path = "src/main.rs"

# [[bin]]
# name = "crawlrs-shaku"
# path = "src/main_shaku.rs"

# =============================================================================
# Build Optimization Profiles
# =============================================================================
# Optimized release builds for production deployment

[profile.release]
# Link-Time Optimization: improves runtime performance by enabling
# cross-crate optimizations (10-20% performance improvement)
lto = "thin"

# Reduce code generation units to 1 for maximum optimization
# Trade-off: longer compile time, but better optimization
codegen-units = 1

# Maximum optimization level
opt-level = 3

# Strip debug symbols to reduce binary size (~10-20% size reduction)
strip = "symbols"

# Enable additional optimizations for release builds
panic = "abort"
overflow-checks = true

[profile.bench]
# Use release profile settings for benchmarks
inherits = "release"
debug = true

[profile.dev]
# Faster incremental builds for development
opt-level = 0
debug = true

[workspace]
# members = ["examples"]  # Removed: examples is now an independent workspace

# =============================================================================
# Database Configuration (使用 dbnexus 管理迁移)
# =============================================================================
# dbnexus 使用 Rust 代码定义表结构，不再需要 SQL 迁移文件
# workspace.metadata.dbnexus = {}

# =============================================================================
# Lint Configuration
# =============================================================================
# Suppress external dependency cfg warnings from confers_macros crate

[lints.rust]
unexpected_cfgs = "allow"
