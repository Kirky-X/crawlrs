[package]
name = "crawlrs"
version = "0.1.0"
edition = "2021"
authors = ["Kirky.X <Kirky-X@outlook.com>"]

exclude = []

[features]
# 默认开启基础功能，使用 Postgres
default = ["engine-reqwest", "redis-cache", "rate-limiting", "metrics", "db-postgres"]

# 全功能组合
full = ["default", "engine-playwright", "engine-fire-cdp", "engine-fire-tls", "engine-flaresolverr", "db-sqlite"]

# --- 引擎特性 ---
# 基础 HTTP 引擎 (始终可用)
engine-reqwest = []

# Playwright 引擎 (引入 chromiumoxide)
engine-playwright = ["dep:chromiumoxide"]

# Fire 引擎组件
engine-fire-cdp = []
engine-fire-tls = []

# FlareSolverr 引擎
engine-flaresolverr = []

# --- 搜索特性 ---
search-google = []
search-bing = []
search-baidu = []
search-sogou = []

# --- 基础设施特性 ---
# Redis 缓存与限流支持
# 注意：redis 依赖通过 rate-limiting 特性管理
redis-cache = []

# 速率限制支持（依赖 redis）
rate-limiting = ["dep:redis"]

# 指标监控
metrics = ["dep:metrics", "dep:metrics-exporter-prometheus"]

# OpenAPI/Swagger 文档支持
# openapi = ["dep:utoipa", "dep:utoipa-axum", "dep:utoipa-swagger-ui"]

# --- 数据库特性 ---
db-postgres = ["sea-orm/sqlx-postgres", "sqlx/postgres"]
db-sqlite = ["sea-orm/sqlx-sqlite", "sqlx/sqlite"]

[dependencies]
# Async runtime and web framework
tokio = { version = "1.49", features = ["full"] }
axum = "0.8"
futures = "0.3"
async-trait = "0.1"
tower = { version = "0.5", features = ["util"] }
tower-http = { version = "0.6", features = ["trace", "cors"] }

# Serialization and configuration
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde_yaml = "0.9"
config = "0.15.19"

# Error handling
thiserror = "2.0.17"
anyhow = "1.0"

# HTTP client and networking
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls-native-roots", "cookies", "http2", "charset", "macos-system-configuration", "gzip", "brotli"] }
url = "2.5"
rustls = { version = "0.23", default-features = false, features = ["ring", "std", "tls12"] }

# Database (根据特性选择后端)
sea-orm = { version = "1.1", default-features = false, features = ["runtime-tokio-rustls", "macros", "with-chrono", "with-uuid", "with-json"] }
sea-orm-migration = "1.1"
sqlx = { version = "0.8", default-features = false, features = ["runtime-tokio-rustls", "macros", "migrate", "uuid", "chrono", "json", "postgres"] }

# Caching and state management
redis = { version = "1.0", features = ["tokio-comp"], optional = true }
dashmap = "6.1.0"
once_cell = "1.21.3"

# Utilities
uuid = { version = "1.19", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
rand = "0.9.2"
validator = { version = "0.20.0", features = ["derive"] }
sysinfo = "0.37"

# Logging and observability
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }
tracing-appender = "0.2"
metrics = { version = "0.24.3", optional = true }
metrics-exporter-prometheus = { version = "0.18.1", default-features = false, features = ["http-listener"], optional = true }

# Web scraping and content processing
scraper = "0.25.0"
robotstxt = "0.3"
chromiumoxide = { version = "0.8.0", default-features = false, features = ["tokio-runtime"], optional = true }

# Text processing and encoding
chardetng = "0.1"
encoding_rs = "0.8"
deunicode = "1.6"
lru = "0.16"
strsim = "0.11"
html-escape = "0.2"
serde_urlencoded = "0.7"
urlencoding = "2.1"

# Cryptography and encoding
base64 = "0.22.1"
hmac = "0.12"
sha2 = "0.10"
hex = "0.4"
bcrypt = "0.18"
zeroize = "1.8"

# Rate limiting and circuit breaking
governor = "0.10"

# Concurrency and synchronization
parking_lot = "0.12"

# Regular expressions
regex = "1.12.2"

# Compression
flate2 = "1.1"
brotli = "8.0"
bytes = "1.11"
aws-sdk-s3 = "1.120.0"
aws-config = "1.8.12"
genai = "0.5.1"
toml = "0.9.11"

# Dependency Injection
shaku = "0.6"
shaku_axum = "0.6"

# API Documentation (optional - controlled by 'openapi' feature)
# utoipa = { version = "5.4", optional = true }
# utoipa-axum = { version = "0.2", optional = true }
# utoipa-swagger-ui = { version = "9.0", optional = true, default-features = false, features = ["axum", "vendored"] }

[dev-dependencies]
tokio = { version = "1.49", features = ["full", "test-util"] }
tokio-test = "0.4"
wiremock = "0.6"
reqwest = { version = "0.12", features = ["json"] }
serde_json = "1.0"
cucumber = { version = "0.22", features = ["macros"] }
axum-test = "18.6.0"
futures = "0.3"
tempfile = "3.24"
uuid = { version = "1.19", features = ["v4"] }
sqlx = { version = "0.8", features = ["runtime-tokio-rustls", "sqlite"] }
criterion = { version = "0.8", features = ["html_reports"] }

[[test]]
name = "integration_tests"
path = "tests/integration/mod.rs"
required-features = ["full"]

[[bench]]
name = "benchmark"
harness = false
path = "benches/benchmark.rs"

[[bin]]
name = "crawlrs"
path = "src/main.rs"

# [[bin]]
# name = "crawlrs-shaku"
# path = "src/main_shaku.rs"

[workspace]
# members = ["examples"]  # Removed: examples is now an independent workspace

[workspace.metadata.sqlx]
migrate-path = "migrations-sqlx"
