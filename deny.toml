# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/

[advisories]
db-urls = ["https://github.com/RustSec/advisory-db"]
yanked = "deny"
# 以下 advisory 为传递依赖中已停止维护的 crate，无可用升级，待上游迁移后移除：
# - RUSTSEC-2026-0173: proc-macro-error2（dbnexus/sea-orm/inklog 依赖）
# - RUSTSEC-2024-0436: paste（inklog → parquet 依赖）
ignore = ["RUSTSEC-2026-0173", "RUSTSEC-2024-0436"]

[licenses]
allow = [
    "MIT", "Apache-2.0", "Apache-2.0 WITH LLVM-exception",
    "BSD-3-Clause", "BSD-2-Clause", "ISC",
    "Unicode-3.0", "Unicode-DFS-2016",
    "Zlib", "CC0-1.0", "MPL-2.0",
    "CDLA-Permissive-2.0", "BSL-1.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
