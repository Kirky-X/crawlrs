version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: crawlrs-minio-test-postgres
    environment:
      POSTGRES_USER: crawlrs
      POSTGRES_PASSWORD: password
      POSTGRES_DB: crawlrs
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crawlrs -d crawlrs"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - crawlrs-minio-network

  redis:
    image: redis:7-alpine
    container_name: crawlrs-minio-test-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - crawlrs-minio-network

  minio:
    image: minio/minio:RELEASE.2024-01-01T00-00-00Z
    container_name: crawlrs-minio-test
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin123
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 5
    networks:
      - crawlrs-minio-network

  crawlrs:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: crawlrs:minio-test
    container_name: crawlrs-minio-app
    command: ["./crawlrs", "api"]
    ports:
      - "3000:3000"
    environment:
      - CRAWLRS__DATABASE__URL=postgres://crawlrs:password@postgres:5432/crawlrs
      - CRAWLRS__REDIS__URL=redis://redis:6379
      - CRAWLRS__SERVER__HOST=0.0.0.0
      - CRAWLRS__SERVER__PORT=3000
      - SKIP_BROWSER_TESTS=true
      - SKIP_SEARCH_TESTS=true
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - crawlrs-minio-network

networks:
  crawlrs-minio-network:
    driver: bridge

volumes:
  minio_data:
