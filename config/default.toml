# Database Configuration
[database]
url = "postgres://crawlrs:password@localhost:5432/crawlrs_test"
max_connections = 20
min_connections = 5
connect_timeout = 30
idle_timeout = 600

# Docker Database Configuration (overridden by environment variables)
[database.docker]
host = "db"
port = 5432
user = "crawlrs"
password = "password"
name = "crawlrs"

# Redis Configuration
[redis]
url = "redis://localhost:6379"

# Docker Redis Configuration (overridden by environment variables)
[redis.docker]
host = "redis"
port = 6379

# Server Configuration
[server]
host = "0.0.0.0"
port = 8899
enable_port_detection = true

# Rate Limiting Configuration
[rate_limiting]
enabled = false
default_rpm = 60

# Concurrency Configuration
[concurrency]
default_team_limit = 10
task_lock_duration_seconds = 300

# Search Configuration
[search]
ab_test_enabled = false
variant_b_weight = 0.1
default_engine = "baidu"

# Search Engine Enable/Disable Configuration
[search.engines]
google_enabled = false
bing_enabled = true
baidu_enabled = true
sogou_enabled = true

# FlareSolverr Configuration (for Google search proxy)
[search.flaresolverr]
enabled = true
url = "http://flaresolverr:8191/v1"
auto_start = true
timeout_seconds = 30
max_retries = 3

# Storage Configuration
[storage]
storage_type = "local"
local_path = "storage"
# s3_region = "us-east-1"
# s3_bucket = "my-bucket"
# s3_access_key = "access-key"
# s3_secret_key = "secret-key"

# Webhook Configuration
[webhook]
timeout_seconds = 10
max_retries = 3
retry_interval_seconds = 60
user_agent = "Crawlrs-Webhook/1.0"
secret = "your-webhook-secret"

# Google Custom Search API Configuration
[google_search]
api_key = ""
cx = ""

# LLM Configuration
[llm]
api_key = "ollama"
model = "qwen3:1:7"
api_base_url = "http://172.24.160.1:11434/v1"
