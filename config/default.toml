# Database Configuration
[database]
# Use environment variable: CRAWLRS__DATABASE__URL or build URL from components
# Example: postgres://user:password@host:5432/database
# For security, password should NOT be hardcoded in this file
max_connections = 20
min_connections = 5
connect_timeout = 30
idle_timeout = 600

# Docker Database Configuration (overridden by environment variables)
# WARNING: Do NOT hardcode passwords in this file!
# Use CRAWLRS__DATABASE__PASSWORD environment variable
[database.docker]
host = "db"
port = 5432
user = "crawlrs"
password = ""  # Set via CRAWLRS__DATABASE__PASSWORD
name = "crawlrs"

# Redis Configuration
[redis]
url = "redis://localhost:6379"

# Docker Redis Configuration (overridden by environment variables)
[redis.docker]
host = "redis"
port = 6379

# Server Configuration
[server]
host = "0.0.0.0"
port = 8899
enable_port_detection = true

# CORS Configuration
# IMPORTANT: Configure specific origins in production for security
[cors]
# Comma-separated list of allowed origins
# Use "*" for development only (allows all origins)
# Example: "http://localhost:3000,https://example.com"
allowed_origins = "*"

# Rate Limiting Configuration
# IMPORTANT: Rate limiting SHOULD be enabled in production to prevent abuse
[rate_limiting]
enabled = true
default_rpm = 60
default_limit = 60
burst_size = 20

# Concurrency Configuration
[concurrency]
default_team_limit = 10
task_lock_duration_seconds = 300

# Search Configuration
[search]
ab_test_enabled = false
variant_b_weight = 0.1
timeout_seconds = 30
rate_limiting_enabled = true
test_data_enabled = false
max_retries = 3
retry_delay_ms = 1000
default_engine = "baidu"

# Search Engine Enable/Disable Configuration
[search.engines]
google_enabled = true
bing_enabled = true
baidu_enabled = true
sogou_enabled = true

# FlareSolverr Configuration (for Google search proxy)
[search.flaresolverr]
enabled = true
url = "http://flaresolverr:8191/v1"
auto_start = true
timeout_seconds = 30
max_retries = 3

# Browser Configuration
[browser]
# Browser auto-download settings
auto_download = true
# Browser cache directory (relative to home or absolute path)
cache_dir = ".cache/crawlrs/chromium"
# Download timeout in seconds
download_timeout_seconds = 300

# Browser executable paths (auto-detected if not set)
# [browser.linux]
# executable = "/usr/bin/google-chrome"
# [browser.macos]
# executable = "/Applications/Google Chrome.app/Contents/MacOS/Google Chrome"
# [browser.windows]
# executable = "C:\\Program Files\\Google\\Chrome\\Application\\chrome.exe"

# Storage Configuration
[storage]
storage_type = "local"
local_path = "storage"
# For S3 storage, use environment variables:
# CRAWLRS__STORAGE__S3_ACCESS_KEY
# CRAWLRS__STORAGE__S3_SECRET_KEY
# s3_region = "us-east-1"
# s3_bucket = "my-bucket"
# s3_access_key = ""  # Set via environment variable
# s3_secret_key = ""  # Set via environment variable

# Webhook Configuration
[webhook]
timeout_seconds = 10
max_retries = 3
retry_interval_seconds = 60
user_agent = "Crawlrs-Webhook/1.0"
# IMPORTANT: Set webhook secret via CRAWLRS__WEBHOOK__SECRET environment variable
# Do NOT use weak default values like "your-webhook-secret"
secret = ""
batch_size = 1000

# LLM Configuration
[llm]
# Set API key via CRAWLRS__LLM__API_KEY environment variable for production
api_key = ""
model = "qwen3:1.7b"
api_base_url = "http://localhost:11434/v1"

# Engine Support Score Configuration
# Scores are used by engine router to select the best engine for a request
# Range: 0-100 (higher = more preferred)
[engine_scores]
# Fire CDP engine scores
fire_cdp_with_tls_screenshot = 100  # TLS fingerprint + screenshot needed
fire_cdp_with_tls = 100             # TLS fingerprint needed (no screenshot)
fire_cdp_screenshot = 80            # Screenshot only
fire_cdp_js = 90                    # JavaScript rendering needed
fire_cdp_actions = 90               # Page interactions needed
fire_cdp_default = 40               # Default score for basic requests

# Fire TLS engine scores
fire_tls_with_tls = 100             # TLS fingerprint needed
fire_tls_unsupported = 0            # JS, screenshot, or actions not supported
fire_tls_default = 40               # Default score for basic requests

# HTTP Proxy Configuration
# Configure proxy for all scraping engines
[proxy]
url = "http://localhost:10808"
enabled = false

# Engine Configuration
# Configure scraping engines (FlareSolverr, Fire Engine, etc.)
[engines.flaresolverr]
enabled = true
url = "http://localhost:8191/v1"
timeout_seconds = 30
max_retries = 3

[engines.fire_cdp]
enabled = false
url = "http://localhost:8191/v1"

[engines.fire_tls]
enabled = false
url = "http://localhost:8191/v1"

# Worker Configuration
# Configure background worker processes
[workers]
# Worker count: "auto" to detect CPU cores, or a fixed number
count = "auto"
# Alternative: count = 5

# Timeout Configuration
# Configure operation timeouts
[timeouts.workers]
webhook_interval_seconds = 5
backlog_interval_seconds = 30

[timeouts.engines]
default_timeout_seconds = 30
playwright_timeout_seconds = 30
flaresolverr_timeout_seconds = 30

[timeouts.retry]
initial_backoff_seconds = 1
max_backoff_seconds = 60

[timeouts.cache]
default_ttl_seconds = 300
memory_ttl_seconds = 300
redis_ttl_seconds = 300

# Logging Configuration
# 日志配置，支持控制台和文件输出
[logging]
# 日志级别可通过 RUST_LOG 环境变量控制
# 默认级别: info, 项目内部: debug

# 控制台输出配置
[logging.console]
enabled = true

# 文件输出配置
[logging.file]
enabled = false
path = "logs/crawlrs.log"
max_file_size_mb = 100
file_count = 10
