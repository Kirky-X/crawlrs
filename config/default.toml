# Database Configuration
[database]
# Use environment variable: CRAWLRS__DATABASE__URL or build URL from components
# Example: postgres://user:password@host:5432/database
# For security, password should NOT be hardcoded in this file
max_connections = 20
min_connections = 5
connect_timeout = 30
idle_timeout = 600

# Docker Database Configuration (overridden by environment variables)
# WARNING: Do NOT hardcode passwords in this file!
# Use CRAWLRS__DATABASE__PASSWORD environment variable
[database.docker]
host = "db"
port = 5432
user = "crawlrs"
password = ""  # Set via CRAWLRS__DATABASE__PASSWORD
name = "crawlrs"

# Redis Configuration
[redis]
url = "redis://localhost:6379"

# Docker Redis Configuration (overridden by environment variables)
[redis.docker]
host = "redis"
port = 6379

# Server Configuration
[server]
host = "0.0.0.0"
port = 8899
enable_port_detection = true

# Rate Limiting Configuration
# IMPORTANT: Rate limiting SHOULD be enabled in production to prevent abuse
[rate_limiting]
enabled = true
default_rpm = 60

# Concurrency Configuration
[concurrency]
default_team_limit = 10
task_lock_duration_seconds = 300

# Search Configuration
[search]
default_engine = "baidu"

# Search Engine Enable/Disable Configuration
[search.engines]
google_enabled = true
bing_enabled = true
baidu_enabled = true
sogou_enabled = true

# FlareSolverr Configuration (for Google search proxy)
[search.flaresolverr]
enabled = true
url = "http://flaresolverr:8191/v1"
auto_start = true
timeout_seconds = 30
max_retries = 3

# Storage Configuration
[storage]
storage_type = "local"
local_path = "storage"
# For S3 storage, use environment variables:
# CRAWLRS__STORAGE__S3_ACCESS_KEY
# CRAWLRS__STORAGE__S3_SECRET_KEY
# s3_region = "us-east-1"
# s3_bucket = "my-bucket"
# s3_access_key = ""  # Set via environment variable
# s3_secret_key = ""  # Set via environment variable

# Webhook Configuration
[webhook]
timeout_seconds = 10
max_retries = 3
retry_interval_seconds = 60
user_agent = "Crawlrs-Webhook/1.0"
# IMPORTANT: Set webhook secret via CRAWLRS__WEBHOOK__SECRET environment variable
# Do NOT use weak default values like "your-webhook-secret"
secret = ""

# LLM Configuration
[llm]
# Set API key via CRAWLRS__LLM__API_KEY environment variable for production
api_key = ""
model = "qwen3:1.7b"
api_base_url = "http://localhost:11434/v1"

# Engine Support Score Configuration
# Scores are used by engine router to select the best engine for a request
# Range: 0-100 (higher = more preferred)
[engine_scores]
# Fire CDP engine scores
fire_cdp_with_tls_screenshot = 100  # TLS fingerprint + screenshot needed
fire_cdp_with_tls = 100             # TLS fingerprint needed (no screenshot)
fire_cdp_screenshot = 80            # Screenshot only
fire_cdp_js = 90                    # JavaScript rendering needed
fire_cdp_actions = 90               # Page interactions needed
fire_cdp_default = 40               # Default score for basic requests

# Fire TLS engine scores
fire_tls_with_tls = 100             # TLS fingerprint needed
fire_tls_unsupported = 0            # JS, screenshot, or actions not supported
fire_tls_default = 40               # Default score for basic requests

# HTTP Proxy Configuration
# Configure proxy for all scraping engines
[proxy]
url = "http://localhost:10808"
enabled = false

# Engine Configuration
# Configure scraping engines (FlareSolverr, Fire Engine, etc.)
[engines.flaresolverr]
enabled = true
url = "http://localhost:8191/v1"
timeout_seconds = 30
max_retries = 3

[engines.fire_cdp]
enabled = false
url = "http://localhost:8191/v1"

[engines.fire_tls]
enabled = false
url = "http://localhost:8191/v1"

# Logging Configuration
# 日志配置，支持控制台和文件输出
[logging]
# 日志级别可通过 RUST_LOG 环境变量控制
# 默认级别: info, 项目内部: debug

# 控制台输出配置
[logging.console]
enabled = true

# 文件输出配置
[logging.file]
enabled = false
path = "logs/crawlrs.log"
max_file_size_mb = 100
file_count = 10
