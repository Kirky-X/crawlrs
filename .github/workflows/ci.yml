name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@d632683dd7b4114ad314bca15554477dd762a938 # v4.2.0
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@d632683dd7b4114ad314bca15554477dd762a938 # v4.2.0
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@f0deed1e0edfc6a9be95417288c0e1099b1eeec3 # v2.7.7
      - name: Clippy (no default features)
        run: cargo clippy --no-default-features -- -D warnings
      - name: Clippy (standard features)
        run: cargo clippy --features standard -- -D warnings
      - name: Clippy (full features)
        run: cargo clippy --features full -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ${{ env.TEST_PG_USER }}
          POSTGRES_PASSWORD: ${{ env.TEST_PG_PASSWORD }}
          # 测试统一使用 crawlrs_test 数据库（与 docker-compose.yml 测试容器一致），
          # 避免 application 配置（CRAWLRS__DATABASE__URL）与测试辅助（TEST_DATABASE_URL）
          # 指向不同数据库导致 schema/数据不一致
          POSTGRES_DB: crawlrs_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # 测试容器凭据（非敏感 — 每次 CI 运行时容器重新创建）
      # 默认 crawlrs/crawlrs 与 docker-compose.yml 测试容器一致
      # 如需自定义，在 GitHub repo Settings → Secrets and variables → Actions → Variables
      # 设置 TEST_PG_USER 和 TEST_PG_PASSWORD
      TEST_PG_USER: ${{ vars.TEST_PG_USER || 'crawlrs' }}
      TEST_PG_PASSWORD: ${{ vars.TEST_PG_PASSWORD || 'crawlrs' }}
      # 应用配置读取（confers env_prefix = CRAWLRS__DATABASE__）
      CRAWLRS__DATABASE__URL: postgresql://${{ vars.TEST_PG_USER || 'crawlrs' }}:${{ vars.TEST_PG_PASSWORD || 'crawlrs' }}@localhost:5432/crawlrs_test
      # 测试辅助函数读取（tests/common/helpers/db_pool.rs）
      TEST_DATABASE_URL: postgresql://${{ vars.TEST_PG_USER || 'crawlrs' }}:${{ vars.TEST_PG_PASSWORD || 'crawlrs' }}@localhost:5432/crawlrs_test
    steps:
      - uses: actions/checkout@d632683dd7b4114ad314bca15554477dd762a938 # v4.2.0
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc198c30 # stable
      - uses: Swatinem/rust-cache@f0deed1e0edfc6a9be95417288c0e1099b1eeec3 # v2.7.7
      - name: Wait for PostgreSQL
        run: |
          for i in {1..30}; do
            if pg_isready -h localhost -p 5432 -U ${{ env.TEST_PG_USER }} >/dev/null 2>&1; then
              echo "PostgreSQL is ready"
              break
            fi
            echo "Waiting for PostgreSQL... ($i/30)"
            sleep 2
          done
      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - name: Run database migrations
        # main.rs 暂无 migrate 子命令，直接用 psql 按文件名顺序执行 migrations/*.sql
        # 文件名前缀 001/002/003 保证执行顺序
        env:
          PGPASSWORD: ${{ env.TEST_PG_PASSWORD }}
        run: |
          for f in migrations/*.sql; do
            echo "Applying $f..."
            psql -h localhost -p 5432 -U ${{ env.TEST_PG_USER }} -d crawlrs_test -v ON_ERROR_STOP=1 -f "$f"
          done
      - name: Run tests (standard features)
        # 跑全部测试（lib + integration tests），不再只跑 --lib
        # integration tests 需要数据库，已在 services.postgres 中配置
        run: cargo test --features standard --verbose

  build:
    name: Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        features: ["standard", "full"]
    steps:
      - uses: actions/checkout@d632683dd7b4114ad314bca15554477dd762a938 # v4.2.0
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - uses: Swatinem/rust-cache@f0deed1e0edfc6a9be95417288c0e1099b1eeec3 # v2.7.7
      - name: Build (${{ matrix.features }})
        run: cargo build --features ${{ matrix.features }} --release

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@d632683dd7b4114ad314bca15554477dd762a938 # v4.2.0
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - name: Install cargo-deny
        run: cargo install cargo-deny --locked
      - name: cargo deny check (advisories + licenses + bans)
        run: cargo deny check --config deny.toml
