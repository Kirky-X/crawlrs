version: 2
updates:
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels: ["dependencies", "rust"]
    reviewers: ["kirky"]
    commit-message:
      prefix: "chore(deps)"
    cooldown:
      default-days: 7
    groups:
      patch:
        update-types: ["patch"]
      minor:
        update-types: ["minor"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels: ["dependencies", "ci"]
    reviewers: ["kirky"]
    commit-message:
      prefix: "chore(ci)"
    cooldown:
      default-days: 7
