version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: crawlrs-test-postgres
    environment:
      POSTGRES_USER: crawlrs
      POSTGRES_PASSWORD: password
      POSTGRES_DB: crawlrs_test
    ports:
      - "5443:5432"
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crawlrs -d crawlrs_test"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: crawlrs-test-redis
    ports:
      - "6380:6379"
    volumes:
      - redis_test_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_test_data:
  redis_test_data:

# 使用方法:
# 1. 启动服务: docker-compose up -d
# 2. 运行测试: 
#    export TEST_DATABASE_URL="postgres://crawlrs:password@localhost:5443/crawlrs_test"
#    export TEST_REDIS_PORT="6380"
#    cargo test --test integration_tests --features full -- --test-threads=1
# 3. 清理: docker-compose down -v
