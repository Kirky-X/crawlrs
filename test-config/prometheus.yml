# Prometheus configuration for crawlrs test environment
# Version: 1.0.0
# Date: 2025-01-12

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: 'test'
    service: 'crawlrs'

# Alertmanager configuration (optional)
alerting:
  alertmanagers:
    - static_configs:
        - targets: []

# Rule files for alerting
rule_files:
  - '/etc/prometheus/rules/*.yml'

# Scrape configurations
scrape_configs:
  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    metrics_path: /metrics

  # crawlrs API server
  - job_name: 'crawlrs-api'
    static_configs:
      - targets: ['api_server:8080']
    metrics_path: /metrics
    scrape_interval: 5s
    scrape_timeout: 5s
    scheme: http
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'crawlrs-api-test'

  # PostgreSQL metrics (if postgres_exporter is available)
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres_test:5432']
    metrics_path: /metrics
    scrape_interval: 30s
    # Note: Requires postgres_exporter to be running

  # Redis metrics (if redis_exporter is available)
  - job_name: 'redis'
    static_configs:
      - targets: ['redis_test:6379']
    metrics_path: /metrics
    scrape_interval: 30s
    # Note: Requires redis_exporter to be running

  # Chrome/Browserless metrics
  - job_name: 'chromium'
    static_configs:
      - targets: ['chromium:3000']
    metrics_path: /metrics
    scrape_interval: 10s

  # FlareSolverr metrics
  - job_name: 'flaresolverr'
    static_configs:
      - targets: ['flaresolverr:8191']
    metrics_path: /v1/status
    scrape_interval: 30s
