# Grafana datasource configuration for crawlrs test environment
# Version: 1.0.0
# Date: 2025-01-12

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
    uid: crawlrs-prometheus-test
    
    # JSON Data configuration
    jsonData:
      graphiteVersion: "1.1"
      tlsAuth: false
      tlsAuthWithCACert: false
      
    # Secure JSON data (if needed)
    secureJsonData:
      tlsCACert: ""
      tlsClientCert: ""
      tlsClientKey: ""
      
    # Version (for migration)
    version: 1
    
    # Read-only mode
    readOnly: false
