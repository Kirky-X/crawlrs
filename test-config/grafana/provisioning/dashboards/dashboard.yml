# Grafana dashboard provisioning configuration for crawlrs test environment
# Version: 1.0.0
# Date: 2025-01-12

apiVersion: 1

providers:
  - name: 'crawlrs-test-dashboards'
    orgId: 1
    folder: 'crawlrs'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards
      foldersFromFilesStructure: true
